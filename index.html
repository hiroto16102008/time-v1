<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Focus Timer | 勉強集中タイマー</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap');
        
        body {
            font-family: 'Noto Sans JP', 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
        }

        /* Dynamic Progress Circle transition */
        .progress-ring__circle {
            transition: stroke-dashoffset 0.35s linear;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        /* Glassmorphism effects */
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .glass-button {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s ease;
        }
        .glass-button:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.2);
        }
        .glass-button.active {
            background: rgba(59, 130, 246, 0.25);
            border-color: #3b82f6;
            color: #60a5fa;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-between p-4 sm:p-6 md:p-8 selection:bg-blue-500 selection:text-white">

    <header class="w-full max-w-xl text-center mt-2 mb-4">
        <div class="flex items-center justify-center gap-2 mb-1">
            <i data-lucide="shield-check" class="w-6 h-6 text-blue-400"></i>
            <h1 class="text-xl sm:text-2xl font-bold tracking-wide text-slate-100">集中タイマー</h1>
        </div>
        <p class="text-xs sm:text-sm text-slate-400">スマホを置いて、自分の時間を取り戻そう</p>
    </header>

    <main class="w-full max-w-xl flex-1 flex flex-col items-center justify-center gap-6">

        <!-- Daily Stats Dashboard Card -->
        <div class="w-full glass-card rounded-2xl p-4 sm:p-5 flex items-center justify-between shadow-xl">
            <div class="flex items-center gap-3">
                <div class="p-3 bg-blue-500/10 rounded-xl text-blue-400 border border-blue-500/20">
                    <i data-lucide="flame" class="w-6 h-6"></i>
                </div>
                <div>
                    <span class="text-xs text-slate-400 font-medium block">本日の合計集中時間</span>
                    <span id="dailyTotalTime" class="text-lg sm:text-2xl font-bold text-slate-100">0分</span>
                </div>
            </div>
            <div class="text-right">
                <span class="text-xs text-slate-400 font-medium block">完了セッション</span>
                <div class="flex items-center justify-end gap-1">
                    <span id="dailySessions" class="text-lg sm:text-2xl font-bold text-blue-400">0</span>
                    <span class="text-xs text-slate-400">回</span>
                </div>
            </div>
        </div>

        <!-- Main Timer Card -->
        <div class="w-full glass-card rounded-3xl p-6 sm:p-8 flex flex-col items-center justify-center shadow-2xl relative overflow-hidden">
            <!-- Background Glow -->
            <div class="absolute -top-24 -left-24 w-48 h-48 bg-blue-600/10 rounded-full blur-3xl pointer-events-none"></div>
            <div class="absolute -bottom-24 -right-24 w-48 h-48 bg-indigo-600/10 rounded-full blur-3xl pointer-events-none"></div>

            <!-- SVG Circular Timer Ring -->
            <div class="relative w-64 h-64 sm:w-72 sm:h-72 flex items-center justify-center my-2">
                <svg class="w-full h-full" viewBox="0 0 240 240">
                    <!-- Track -->
                    <circle
                        cx="120"
                        cy="120"
                        r="105"
                        stroke="rgba(255, 255, 255, 0.05)"
                        stroke-width="12"
                        fill="none"
                    />
                    <!-- Progress -->
                    <circle
                        id="progressCircle"
                        class="progress-ring__circle"
                        cx="120"
                        cy="120"
                        r="105"
                        stroke="#3b82f6"
                        stroke-width="12"
                        stroke-dasharray="659.73"
                        stroke-dashoffset="0"
                        stroke-linecap="round"
                        fill="none"
                    />
                </svg>

                <!-- Time Text Inside Circle -->
                <div class="absolute inset-0 flex flex-col items-center justify-center text-center">
                    <span id="timerDisplay" class="text-5xl sm:text-6xl font-bold font-mono tracking-tighter text-slate-50">25:00</span>
                    <span id="statusLabel" class="mt-2 text-xs font-semibold tracking-wider uppercase text-blue-400/90 bg-blue-500/10 px-3 py-1 rounded-full border border-blue-500/20">準備完了</span>
                </div>
            </div>

            <!-- Quick Presets and Adjustments (Enabled when paused/idle) -->
            <div id="timeAdjustContainer" class="w-full flex flex-col items-center gap-3 mt-4">
                <!-- Preset Buttons -->
                <div class="flex items-center justify-center gap-2 w-full">
                    <button onclick="setPreset(15)" class="preset-btn glass-button px-3 py-1.5 rounded-lg text-xs font-medium text-slate-300">15分</button>
                    <button onclick="setPreset(25)" class="preset-btn glass-button active px-3 py-1.5 rounded-lg text-xs font-medium text-slate-300">25分</button>
                    <button onclick="setPreset(45)" class="preset-btn glass-button px-3 py-1.5 rounded-lg text-xs font-medium text-slate-300">45分</button>
                    <button onclick="setPreset(60)" class="preset-btn glass-button px-3 py-1.5 rounded-lg text-xs font-medium text-slate-300">60分</button>
                </div>

                <!-- Custom +/- Controls -->
                <div class="flex items-center justify-center gap-3">
                    <button onclick="adjustTime(-5)" class="glass-button w-8 h-8 rounded-full flex items-center justify-center text-slate-300 hover:text-white" title="-5分">
                        <i data-lucide="minus" class="w-4 h-4"></i>
                    </button>
                    <span class="text-xs text-slate-400 font-medium">時間を微調整</span>
                    <button onclick="adjustTime(5)" class="glass-button w-8 h-8 rounded-full flex items-center justify-center text-slate-300 hover:text-white" title="+5分">
                        <i data-lucide="plus" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>

            <!-- Timer Action Buttons -->
            <div class="flex items-center gap-4 mt-6">
                <button id="startPauseBtn" onclick="toggleTimer()" class="w-36 py-3 px-6 bg-blue-600 hover:bg-blue-500 text-white font-semibold rounded-2xl shadow-lg shadow-blue-600/30 transition-all flex items-center justify-center gap-2 active:scale-95">
                    <i id="startPauseIcon" data-lucide="play" class="w-5 h-5 fill-current"></i>
                    <span id="startPauseText">スタート</span>
                </button>
                <button onclick="resetTimer()" class="glass-button p-3 rounded-2xl text-slate-400 hover:text-slate-100 active:scale-95" title="リセット">
                    <i data-lucide="rotate-ccw" class="w-5 h-5"></i>
                </button>
            </div>
        </div>

        <!-- Ambient Sound Controller -->
        <div class="w-full glass-card rounded-2xl p-5 shadow-xl">
            <div class="flex items-center justify-between mb-3">
                <div class="flex items-center gap-2">
                    <i data-lucide="headphones" class="w-4 h-4 text-blue-400"></i>
                    <h3 class="text-sm font-semibold text-slate-200">集中環境音 (Web Audio)</h3>
                </div>
                <div class="flex items-center gap-2">
                    <i data-lucide="volume-2" class="w-4 h-4 text-slate-400"></i>
                    <input id="volumeSlider" type="range" min="0" max="1" step="0.05" value="0.5" oninput="changeVolume(this.value)" class="w-20 accent-blue-500 cursor-pointer h-1.5 bg-slate-700 rounded-lg">
                </div>
            </div>

            <!-- Sound Selector Chips -->
            <div class="grid grid-cols-2 sm:grid-cols-5 gap-2">
                <button onclick="setSound('off')" class="sound-chip glass-button active py-2 px-3 rounded-xl text-xs font-medium flex items-center justify-center gap-1.5 text-slate-300">
                    <i data-lucide="volume-x" class="w-3.5 h-3.5"></i> オフ
                </button>
                <button onclick="setSound('rain')" class="sound-chip glass-button py-2 px-3 rounded-xl text-xs font-medium flex items-center justify-center gap-1.5 text-slate-300">
                    <i data-lucide="cloud-rain" class="w-3.5 h-3.5"></i> 雨の音
                </button>
                <button onclick="setSound('waves')" class="sound-chip glass-button py-2 px-3 rounded-xl text-xs font-medium flex items-center justify-center gap-1.5 text-slate-300">
                    <i data-lucide="waves" class="w-3.5 h-3.5"></i> 波の音
                </button>
                <button onclick="setSound('forest')" class="sound-chip glass-button py-2 px-3 rounded-xl text-xs font-medium flex items-center justify-center gap-1.5 text-slate-300">
                    <i data-lucide="wind" class="w-3.5 h-3.5"></i> 風・森
                </button>
                <button onclick="setSound('white')" class="sound-chip glass-button py-2 px-3 rounded-xl text-xs font-medium flex items-center justify-center gap-1.5 text-slate-300">
                    <i data-lucide="radio" class="w-3.5 h-3.5"></i> ノイズ
                </button>
            </div>
        </div>

    </main>

    <!-- Motivational Footer Tip -->
    <footer class="w-full max-w-xl text-center mt-6">
        <p class="text-xs text-slate-500 flex items-center justify-center gap-1">
            <i data-lucide="smartphone-off" class="w-3.5 h-3.5"></i> タイマー作動中はスマホを画面伏せで遠くに置きましょう
        </p>
    </footer>

    <!-- Completion Modal -->
    <div id="completionModal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-md flex items-center justify-center p-4 z-50 opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="glass-card max-w-sm w-full rounded-3xl p-6 text-center shadow-2xl border-blue-500/30">
            <div class="w-16 h-16 bg-blue-500/20 text-blue-400 rounded-2xl flex items-center justify-center mx-auto mb-4 border border-blue-500/30">
                <i data-lucide="award" class="w-8 h-8"></i>
            </div>
            <h2 class="text-xl font-bold text-slate-100 mb-1">お疲れ様でした！</h2>
            <p id="completionMessage" class="text-sm text-slate-300 mb-6">集中時間を無事に完了しました。しっかり5分間休憩しましょう！</p>
            <button onclick="closeModal()" class="w-full py-3 bg-blue-600 hover:bg-blue-500 text-white font-semibold rounded-xl shadow-lg transition-all">
                受け取る・休憩へ
            </button>
        </div>
    </div>

    <!-- JavaScript logic -->
    <script>
        // Lucide Icons Render
        lucide.createIcons();

        // Timer State Variables
        let timerInterval = null;
        let selectedDuration = 25 * 60; // default 25 minutes in seconds
        let timeRemaining = 25 * 60;
        let isRunning = false;
        let selectedSound = 'off';
        let volume = 0.5;

        // Daily Tracker Variables (Persisted in localStorage)
        let dailyFocusSeconds = 0;
        let dailyCompletedSessions = 0;

        // Web Audio API Context
        let audioCtx = null;
        let noiseNode = null;
        let gainNode = null;
        let filterNode = null;
        let lfoNode = null;

        const CIRCLE_RADIUS = 105;
        const CIRCLE_CIRCUMFERENCE = 2 * Math.PI * CIRCLE_RADIUS;

        // Initialize App on DOM Load
        document.addEventListener('DOMContentLoaded', () => {
            loadLocalStorageData();
            updateDisplay();
            updateProgressRing();
            updateDailyUI();
        });

        function loadLocalStorageData() {
            const today = new Date().toISOString().slice(0, 10); // YYYY-MM-DD
            const savedDate = localStorage.getItem('focus_timer_date');

            if (savedDate === today) {
                dailyFocusSeconds = parseInt(localStorage.getItem('focus_timer_seconds') || '0', 10);
                dailyCompletedSessions = parseInt(localStorage.getItem('focus_timer_sessions') || '0', 10);
            } else {
                // New day, reset counters
                localStorage.setItem('focus_timer_date', today);
                localStorage.setItem('focus_timer_seconds', '0');
                localStorage.setItem('focus_timer_sessions', '0');
                dailyFocusSeconds = 0;
                dailyCompletedSessions = 0;
            }
        }

        function saveLocalStorageData() {
            const today = new Date().toISOString().slice(0, 10);
            localStorage.setItem('focus_timer_date', today);
            localStorage.setItem('focus_timer_seconds', dailyFocusSeconds.toString());
            localStorage.setItem('focus_timer_sessions', dailyCompletedSessions.toString());
        }

        function updateDailyUI() {
            const minutes = Math.floor(dailyFocusSeconds / 60);
            const hours = Math.floor(minutes / 60);
            const remMinutes = minutes % 60;

            let timeStr = `${minutes}分`;
            if (hours > 0) {
                timeStr = `${hours}時間 ${remMinutes}分`;
            }

            document.getElementById('dailyTotalTime').innerText = timeStr;
            document.getElementById('dailySessions').innerText = dailyCompletedSessions;
        }

        function updateDisplay() {
            const m = Math.floor(timeRemaining / 60).toString().padStart(2, '0');
            const s = (timeRemaining % 60).toString().padStart(2, '0');
            document.getElementById('timerDisplay').innerText = `${m}:${s}`;
            document.title = isRunning ? `(${m}:${s}) 集中中 | Focus Timer` : 'Focus Timer | 勉強集中タイマー';
        }

        function updateProgressRing() {
            const circle = document.getElementById('progressCircle');
            const fraction = timeRemaining / selectedDuration;
            const offset = CIRCLE_CIRCUMFERENCE * (1 - fraction);
            circle.style.strokeDashoffset = offset;
        }

        function toggleTimer() {
            if (isRunning) {
                pauseTimer();
            } else {
                startTimer();
            }
        }

        function startTimer() {
            if (isRunning) return;
            isRunning = true;
            
            // UI Updates
            document.getElementById('startPauseText').innerText = '一時停止';
            document.getElementById('startPauseIcon').setAttribute('data-lucide', 'pause');
            document.getElementById('statusLabel').innerText = '集中中';
            document.getElementById('statusLabel').className = "mt-2 text-xs font-semibold tracking-wider uppercase text-emerald-400 bg-emerald-500/10 px-3 py-1 rounded-full border border-emerald-500/20";
            document.getElementById('timeAdjustContainer').classList.add('opacity-40', 'pointer-events-none');
            lucide.createIcons();

            // Start Audio if selected
            if (selectedSound !== 'off') {
                startAudioEngine();
            }

            timerInterval = setInterval(() => {
                if (timeRemaining > 0) {
                    timeRemaining--;
                    updateDisplay();
                    updateProgressRing();
                } else {
                    onTimerComplete();
                }
            }, 1000);
        }

        function pauseTimer() {
            if (!isRunning) return;
            isRunning = false;
            clearInterval(timerInterval);

            // UI Updates
            document.getElementById('startPauseText').innerText = '再開';
            document.getElementById('startPauseIcon').setAttribute('data-lucide', 'play');
            document.getElementById('statusLabel').innerText = '一時停止中';
            document.getElementById('statusLabel').className = "mt-2 text-xs font-semibold tracking-wider uppercase text-amber-400 bg-amber-500/10 px-3 py-1 rounded-full border border-amber-500/20";
            document.getElementById('timeAdjustContainer').classList.remove('opacity-40', 'pointer-events-none');
            lucide.createIcons();

            stopAudioEngine();
        }

        function resetTimer() {
            pauseTimer();
            timeRemaining = selectedDuration;
            document.getElementById('startPauseText').innerText = 'スタート';
            document.getElementById('statusLabel').innerText = '準備完了';
            document.getElementById('statusLabel').className = "mt-2 text-xs font-semibold tracking-wider uppercase text-blue-400/90 bg-blue-500/10 px-3 py-1 rounded-full border border-blue-500/20";
            updateDisplay();
            updateProgressRing();
        }

        function onTimerComplete() {
            pauseTimer();
            
            // Accumulate statistics
            dailyFocusSeconds += selectedDuration;
            dailyCompletedSessions += 1;
            saveLocalStorageData();
            updateDailyUI();

            // Play completion chime
            playCompletionChime();

            // Show Modal
            const mins = Math.round(selectedDuration / 60);
            document.getElementById('completionMessage').innerText = `${mins}分間の集中セッションをクリアしました！素晴らしい集中力です。`;
            const modal = document.getElementById('completionModal');
            modal.classList.remove('opacity-0', 'pointer-events-none');
        }

        function closeModal() {
            const modal = document.getElementById('completionModal');
            modal.classList.add('opacity-0', 'pointer-events-none');
            resetTimer();
        }

        function setPreset(minutes) {
            if (isRunning) return;
            selectedDuration = minutes * 60;
            timeRemaining = selectedDuration;

            // Highlight active preset UI
            const buttons = document.querySelectorAll('.preset-btn');
            buttons.forEach(btn => {
                if (btn.innerText.includes(`${minutes}分`)) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });

            updateDisplay();
            updateProgressRing();
        }

        function adjustTime(amountMinutes) {
            if (isRunning) return;
            let newMins = Math.floor(selectedDuration / 60) + amountMinutes;
            if (newMins < 1) newMins = 1;
            if (newMins > 120) newMins = 120;
            
            selectedDuration = newMins * 60;
            timeRemaining = selectedDuration;

            // Clear preset highlights
            document.querySelectorAll('.preset-btn').forEach(btn => btn.classList.remove('active'));

            updateDisplay();
            updateProgressRing();
        }

        function initAudioContext() {
            if (!audioCtx) {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContext();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function setSound(type) {
            selectedSound = type;

            // Update UI Chips
            const chips = document.querySelectorAll('.sound-chip');
            chips.forEach(chip => {
                const isMatch = chip.getAttribute('onclick').includes(`'${type}'`);
                if (isMatch) {
                    chip.classList.add('active');
                } else {
                    chip.classList.remove('active');
                }
            });

            if (isRunning) {
                stopAudioEngine();
                if (type !== 'off') {
                    startAudioEngine();
                }
            }
        }

        function changeVolume(val) {
            volume = parseFloat(val);
            if (gainNode && audioCtx) {
                gainNode.gain.setValueAtTime(volume * 0.15, audioCtx.currentTime);
            }
        }

        function createNoiseBuffer() {
            const bufferSize = audioCtx.sampleRate * 2;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const output = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                output[i] = Math.random() * 2 - 1;
            }
            return buffer;
        }

        function startAudioEngine() {
            initAudioContext();
            stopAudioEngine(); // reset existing nodes

            if (selectedSound === 'off') return;

            // Source White Noise
            noiseNode = audioCtx.createBufferSource();
            noiseNode.buffer = createNoiseBuffer();
            noiseNode.loop = true;

            // Master Gain
            gainNode = audioCtx.createGain();
            gainNode.gain.setValueAtTime(volume * 0.15, audioCtx.currentTime);

            // Filter setup based on sound choice
            filterNode = audioCtx.createBiquadFilter();

            if (selectedSound === 'rain') {
                filterNode.type = 'lowpass';
                filterNode.frequency.setValueAtTime(1000, audioCtx.currentTime);
                noiseNode.connect(filterNode);
                filterNode.connect(gainNode);
            } else if (selectedSound === 'waves') {
                filterNode.type = 'bandpass';
                filterNode.frequency.setValueAtTime(400, audioCtx.currentTime);
                filterNode.Q.setValueAtTime(1.0, audioCtx.currentTime);

                // LFO to simulate swelling waves
                lfoNode = audioCtx.createOscillator();
                lfoNode.frequency.setValueAtTime(0.12, audioCtx.currentTime); // ~8 sec wave cycle
                const lfoGain = audioCtx.createGain();
                lfoGain.gain.setValueAtTime(300, audioCtx.currentTime);
                lfoNode.connect(lfoGain);
                lfoGain.connect(filterNode.frequency);
                lfoNode.start();

                noiseNode.connect(filterNode);
                filterNode.connect(gainNode);
            } else if (selectedSound === 'forest') {
                filterNode.type = 'bandpass';
                filterNode.frequency.setValueAtTime(600, audioCtx.currentTime);
                filterNode.Q.setValueAtTime(3.0, audioCtx.currentTime);

                // Slow wind sweep
                lfoNode = audioCtx.createOscillator();
                lfoNode.frequency.setValueAtTime(0.08, audioCtx.currentTime);
                const lfoGain = audioCtx.createGain();
                lfoGain.gain.setValueAtTime(250, audioCtx.currentTime);
                lfoNode.connect(lfoGain);
                lfoGain.connect(filterNode.frequency);
                lfoNode.start();

                noiseNode.connect(filterNode);
                filterNode.connect(gainNode);
            } else if (selectedSound === 'white') {
                filterNode.type = 'lowpass';
                filterNode.frequency.setValueAtTime(3000, audioCtx.currentTime);
                noiseNode.connect(filterNode);
                filterNode.connect(gainNode);
            }

            gainNode.connect(audioCtx.destination);
            noiseNode.start();
        }

        function stopAudioEngine() {
            if (noiseNode) {
                try { noiseNode.stop(); } catch(e){}
                noiseNode.disconnect();
                noiseNode = null;
            }
            if (lfoNode) {
                try { lfoNode.stop(); } catch(e){}
                lfoNode.disconnect();
                lfoNode = null;
            }
            if (filterNode) {
                filterNode.disconnect();
                filterNode = null;
            }
            if (gainNode) {
                gainNode.disconnect();
                gainNode = null;
            }
        }

        function playCompletionChime() {
            initAudioContext();
            const now = audioCtx.currentTime;
            
            // Pleasant 3-note chime (C5, E5, G5)
            const freqs = [523.25, 659.25, 783.99];
            freqs.forEach((freq, idx) => {
                const osc = audioCtx.createOscillator();
                const noteGain = audioCtx.createGain();

                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, now + idx * 0.15);

                noteGain.gain.setValueAtTime(0, now + idx * 0.15);
                noteGain.gain.linearRampToValueAtTime(0.3, now + idx * 0.15 + 0.05);
                noteGain.gain.exponentialRampToValueAtTime(0.001, now + idx * 0.15 + 0.8);

                osc.connect(noteGain);
                noteGain.connect(audioCtx.destination);

                osc.start(now + idx * 0.15);
                osc.stop(now + idx * 0.15 + 0.8);
            });
        }
    </script>
</body>
</html>
